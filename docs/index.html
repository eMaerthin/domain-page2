<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Page</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 38rem;
      }
      h1 {
        margin-bottom: 0.5rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }
      p {
        line-height: 1.5;
      }
      a {
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Domain Page 2</h1>
      <p>
        Welcome to the repository. <code>docs/</code> is configured as the
        GitHub Pages build output so you can deploy static content directly
        from this directory.
      </p>
      <p>
        Commit your site assets inside <code>docs/</code> and push to
        <code>main</code> to publish automatically.
      </p>
      <p>
        Need help configuring a build step? Just ask.
      </p>
    </div>
  </body>
</html>
